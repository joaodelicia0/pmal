<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMAL 2026 - Hub de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .active-day { background-color: #1e293b !important; color: white !important; transform: scale(0.98); }
        .card { transition: transform 0.1s ease; cursor: pointer; }
        .card:active { transform: scale(0.96); }
        .task-done { opacity: 0.5; text-decoration: line-through; filter: grayscale(1); border-color: #e2e8f0 !important; background-color: #f8fafc !important; }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        @media (max-width: 640px) {
            .tab-text { font-size: 0.7rem; }
            .header-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body class="pb-20">

    <!-- Cabeçalho Principal -->
    <header class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="header-title font-black tracking-tighter uppercase">Missão PMAL 2026</h1>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Foco, Força e Farda</p>
            </div>
            <div class="flex flex-col items-end">
                <span id="header-progress" class="text-blue-400 font-black text-lg">0%</span>
                <div class="w-20 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                    <div id="header-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Navegação por Abas -->
    <nav class="bg-white border-b border-slate-200 sticky top-[68px] z-40">
        <div class="max-w-4xl mx-auto flex justify-around">
            <button onclick="switchTab('overview')" id="tab-overview" class="tab-text py-4 px-2 font-bold uppercase tracking-wider active-tab text-slate-500">Início</button>
            <button onclick="switchTab('schedule')" id="tab-schedule" class="tab-text py-4 px-2 font-bold uppercase tracking-wider text-slate-500">Rotina</button>
            <button onclick="switchTab('strategy')" id="tab-strategy" class="tab-text py-4 px-2 font-bold uppercase tracking-wider text-slate-500">Estratégia</button>
        </div>
    </nav>

    <!-- Conteúdo Dinâmico -->
    <main class="max-w-4xl mx-auto p-4 md:p-6">
        
        <!-- DASHBOARD INICIAL -->
        <section id="content-overview" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Distribuição de Tempo</h3>
                    <div class="h-64"><canvas id="distChart"></canvas></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center items-center text-center">
                    <h3 class="text-sm font-black text-slate-400 uppercase mb-2 tracking-widest">Meta de Hoje</h3>
                    <div class="relative inline-flex items-center justify-center">
                        <svg class="w-32 h-32">
                            <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="50" cx="64" cy="64"/>
                            <circle class="text-blue-600 progress-ring" stroke-width="8" stroke-dasharray="314.15" stroke-dashoffset="314.15" stroke-linecap="round" stroke="currentColor" fill="transparent" r="50" cx="64" cy="64" id="circle-progress"/>
                        </svg>
                        <span id="circle-text" class="absolute text-2xl font-black">0%</span>
                    </div>
                    <p class="mt-4 text-[11px] font-medium text-slate-500 italic">"O sucesso é a soma de pequenos esforços repetidos dia após dia."</p>
                </div>
            </div>
        </section>

        <!-- CRONOGRAMA DIÁRIO -->
        <section id="content-schedule" class="hidden space-y-6">
            <div class="flex overflow-x-auto gap-2 no-scrollbar pb-2" id="day-selector">
                <!-- Inserido via JS -->
            </div>

            <div id="timeline" class="space-y-3">
                <!-- Inserido via JS -->
            </div>
            
            <button onclick="resetCurrentDay()" class="w-full py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-2 border-dashed border-slate-200 rounded-2xl active:bg-slate-100">
                Limpar Tarefas de Hoje
            </button>
        </section>

        <!-- ESTRATÉGIA E TAF -->
        <section id="content-strategy" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-black text-slate-800 mb-4 uppercase">Prioridades do Edital</h3>
                <div class="h-64"><canvas id="priorityChart"></canvas></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100">
                    <span class="text-2xl">🏃</span>
                    <h4 class="font-black text-blue-900 mt-2 text-sm">Corrida</h4>
                    <p class="text-[10px] text-blue-700 font-bold uppercase mt-1">2.400 Metros</p>
                    <p class="text-[10px] text-blue-600">Foco: Resistência</p>
                </div>
                <div class="bg-indigo-50 p-5 rounded-3xl border border-indigo-100">
                    <span class="text-2xl">🏋️</span>
                    <h4 class="font-black text-indigo-900 mt-2 text-sm">Barra Fixa</h4>
                    <p class="text-[10px] text-indigo-700 font-bold uppercase mt-1">5 Repetições</p>
                    <p class="text-[10px] text-indigo-600">Foco: Força</p>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Dados das Rotinas extraídos dos arquivos originais
        const scheduleData = {
            semana: [
                { t: "05:00", task: "Treino / Corrida", cat: "TAF", icon: "🏃" },
                { t: "07:00", task: "Assuntos Novos / Matemática", cat: "ESTUDO", icon: "📚" },
                { t: "08:00", task: "Curso de Inglês / Maker", cat: "OUTROS", icon: "💻" },
                { t: "12:00", task: "Aulas IFAL", cat: "IFAL", icon: "🏫" },
                { t: "19:20", task: "Musculação", cat: "TAF", icon: "🏋️" },
                { t: "21:30", task: "Anki / Questões", cat: "REVISÃO", icon: "📝" }
            ],
            sabado: [
                { t: "08:00", task: "Simulado Geral", cat: "TESTE", icon: "⏱️" },
                { t: "10:30", task: "Revisão de Erros", cat: "ESTUDO", icon: "🔍" },
                { t: "14:00", task: "Matéria em Atraso", cat: "AJUSTE", icon: "🛠️" }
            ],
            domingo: [
                { t: "09:00", task: "Redação Semanal", cat: "ESCRITA", icon: "✍️" },
                { t: "11:00", task: "Organização da Semana", cat: "PLANEJAMENTO", icon: "📅" }
            ]
        };

        const weekDays = [
            { id: 'seg', label: 'Seg', key: 'semana' },
            { id: 'ter', label: 'Ter', key: 'semana' },
            { id: 'qua', label: 'Qua', key: 'semana' },
            { id: 'qui', label: 'Qui', key: 'semana' },
            { id: 'sex', label: 'Sex', key: 'semana' },
            { id: 'sab', label: 'Sáb', key: 'sabado' },
            { id: 'dom', label: 'Dom', key: 'domingo' }
        ];

        let currentDayId = '';
        let completedTasks = JSON.parse(localStorage.getItem('pmal_elite_progress')) || {};

        function switchTab(tabId) {
            ['overview', 'schedule', 'strategy'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active-tab');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('active-tab');
        }

        function initDaySelector() {
            const container = document.getElementById('day-selector');
            const today = new Date().getDay();
            const todayIdx = today === 0 ? 6 : today - 1;

            weekDays.forEach((day, idx) => {
                const btn = document.createElement('button');
                btn.className = "min-w-[70px] py-4 rounded-2xl bg-white border border-slate-200 font-bold text-slate-600 shadow-sm transition-all";
                btn.innerText = day.label;
                btn.onclick = () => {
                    document.querySelectorAll('#day-selector button').forEach(b => b.classList.remove('active-day'));
                    btn.classList.add('active-day');
                    currentDayId = day.id;
                    renderTimeline(day.key);
                };
                container.appendChild(btn);
                if(idx === todayIdx) btn.click();
            });
        }

        function renderTimeline(key) {
            const container = document.getElementById('timeline');
            container.innerHTML = '';
            const tasks = scheduleData[key];
            
            tasks.forEach((item, idx) => {
                const taskId = `${currentDayId}-${idx}`;
                const isDone = completedTasks[taskId];
                
                container.innerHTML += `
                    <div onclick="toggleTask('${taskId}', '${key}')" class="card bg-white p-4 rounded-2xl flex items-center gap-4 border border-slate-200 shadow-sm ${isDone ? 'task-done' : ''}">
                        <div class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-xl">${item.icon}</div>
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800 text-[13px] leading-tight">${item.task}</h4>
                            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mt-1">${item.cat}</p>
                        </div>
                        <div class="text-right">
                            <span class="block font-mono font-black text-blue-600 text-xs">${item.t}</span>
                            <div class="mt-1 w-5 h-5 rounded-full border-2 ${isDone ? 'bg-blue-600 border-blue-600' : 'border-slate-200'} flex items-center justify-center transition-all mx-auto">
                                ${isDone ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            updateProgress();
        }

        function toggleTask(taskId, key) {
            completedTasks[taskId] = !completedTasks[taskId];
            localStorage.setItem('pmal_elite_progress', JSON.stringify(completedTasks));
            renderTimeline(key);
        }

        function resetCurrentDay() {
            if(confirm("Deseja reiniciar o progresso de hoje?")) {
                const dayKey = weekDays.find(d => d.id === currentDayId).key;
                const tasks = scheduleData[dayKey];
                tasks.forEach((_, idx) => delete completedTasks[`${currentDayId}-${idx}`]);
                localStorage.setItem('pmal_elite_progress', JSON.stringify(completedTasks));
                renderTimeline(dayKey);
            }
        }

        function updateProgress() {
            const currentDayKey = weekDays.find(d => d.id === currentDayId).key;
            const tasksToday = scheduleData[currentDayKey];
            const doneToday = tasksToday.filter((_, i) => completedTasks[`${currentDayId}-${i}`]).length;
            const pct = tasksToday.length > 0 ? Math.round((doneToday / tasksToday.length) * 100) : 0;

            document.getElementById('header-progress').innerText = `${pct}%`;
            document.getElementById('header-bar').style.width = `${pct}%`;
            document.getElementById('circle-text').innerText = `${pct}%`;
            
            const circle = document.getElementById('circle-progress');
            const offset = 314.15 - (pct / 100 * 314.15);
            circle.style.strokeDashoffset = offset;
        }

        function initCharts() {
            new Chart(document.getElementById('distChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Sono', 'IFAL', 'Estudo', 'TAF', 'Livre'],
                    datasets: [{
                        data: [42, 46, 28, 15, 37],
                        backgroundColor: ['#0f172a', '#2563eb', '#f59e0b', '#10b981', '#cbd5e1'],
                        borderWidth: 0,
                        cutout: '75%'
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 10, weight: '700' } } } 
                    } 
                }
            });

            new Chart(document.getElementById('priorityChart'), {
                type: 'bar',
                data: {
                    labels: ['Português', 'Lei PMAL', 'Redação', 'D. Penal', 'Matemática'],
                    datasets: [{
                        data: [10, 9, 8, 7, 5],
                        backgroundColor: ['#2563eb', '#10b981', '#f43f5e', '#9333ea', '#f59e0b'],
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 11 } } }
                    }
                }
            });
        }

        window.onload = () => {
            initDaySelector();
            initCharts();
        };
    </script>
</body>
</html>
